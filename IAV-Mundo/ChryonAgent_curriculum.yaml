# Curriculum learning — 4 lições, com 2 warm-ups e 2 saltos qualitativos.
# O parâmetro `step_count` controla o número de degraus de uma escada
# construída em runtime pelo StairsAgent.
#
# Cada degrau tem 0.5m de altura — bem dentro do stepOffset = 1.0 do
# CharacterController, portanto a subida individual é trivial fisicamente.
# A dificuldade cresce em duas etapas qualitativas (1→2 e 2→3) e duas
# warm-ups (0 e 1):
#
#   step_count = 0  → terreno plano, alvo no chão (caso base).
#   step_count = 3  → escada recta. WARM-UP: a política "andar para o alvo"
#                     da Lição 0 ainda funciona aqui; só a sequência é mais
#                     longa, porque o stepOffset resolve cada degrau.
#                     Útil como ponte mas não força capacidade nova.
#   step_count = 5  → escada com curva 90° a meio. SALTO QUALITATIVO: sem
#                     rays, o agente passa ao lado da escada — o vector
#                     aponta para o alvo no canto, mas a geometria obriga
#                     a desviar primeiro. Política da Lição 1 deixa de
#                     chegar.
#   step_count = 8  → escada zig-zag. SALTO QUALITATIVO: integração temporal
#                     longa sobre múltiplas curvas com sinais alternados.
#                     Política da Lição 2 não chega.
#
# Cada lição avança quando o reward médio (suavizado) ultrapassar
# `threshold`, e passaram pelo menos `min_lesson_length` episódios.
#
# Usar: mlagents-learn StairsAgent_curriculum.yaml --run-id=stairs_curr_01

behaviors:
  ChryonAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 5.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 10000

environment_parameters:
  stage:
    curriculum:
      - name: Lesson0_static
        completion_criteria:
          measure: reward
          behavior: ChryonAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 6
        value: 0
      - name: Lesson1_dynamic
        completion_criteria:
          measure: reward
          behavior: ChryonAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 6
        value: 1
      - name: Lesson2_day
        completion_criteria:
          measure: reward
          behavior: ChryonAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 6
        value: 2
      - name: Lesson3_dayCycle
        value: 3
